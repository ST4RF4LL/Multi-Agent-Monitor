<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent Monitor | OpenCode 多实例审计监控器</title>
  <meta name="description" content="Web-based monitor for orchestrating multiple OpenCode instances for parallel microservice security auditing">
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
</head>
<body>
  <div id="app">
    <!-- ═══ Setup Screen ═══ -->
    <div id="setup-screen">
      <div class="setup-container">
        <div class="setup-logo">
          <h1>🔮 Multi-Agent Monitor</h1>
          <p>OpenCode 多实例并行审计监控器</p>
        </div>
        <div class="setup-card">
          <div class="form-group">
            <label>📁 项目根目录</label>
            <input type="text" id="input-project-root" placeholder="D:\path\to\your\microservices" spellcheck="false">
            <div class="hint">包含多个微服务子目录的项目根路径</div>
          </div>
          <div class="form-group">
            <label>📝 审计 Prompt</label>
            <textarea id="input-audit-prompt" placeholder="请对当前微服务项目进行全面的安全审计..." spellcheck="false"></textarea>
            <div class="hint">统一下发给每个 OpenCode 实例的审计指令</div>
          </div>
          <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label>⚡ 最大并发数</label>
              <input type="number" id="input-max-concurrent" value="3" min="1" max="20">
              <div class="hint">同时运行的审计实例</div>
            </div>
            <div class="form-group">
              <label>🔌 起始端口</label>
              <input type="number" id="input-port-start" value="4100" min="1024" max="65500">
              <div class="hint">API 服务端口基数</div>
            </div>
            <div class="form-group">
              <label>🤖 运行模型设置</label>
              <input type="text" id="input-model" placeholder="留空默认">
              <div class="hint">例如: gpt-4o</div>
            </div>
          </div>
          <button class="btn btn-primary btn-lg btn-full" id="btn-launch" onclick="App.launch()">
            🚀 扫描并启动
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ Monitor Screen ═══ -->
    <div id="monitor-screen" style="display:none; flex-direction:column; height:100vh;">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-brand">
          <span class="icon">🔮</span>
          <span>Multi-Agent Monitor</span>
        </div>
        <div class="toolbar-stats" id="toolbar-stats"></div>
        <div class="toolbar-actions">
          <button class="btn btn-audit btn-sm" id="btn-start-audit" onclick="App.startBatchAudit()">
            ▶ 批量审计
          </button>
          <button class="btn btn-ghost btn-sm" onclick="App.startAllInstances()">启动全部</button>
          <button class="btn btn-ghost btn-sm" onclick="App.stopAllInstances()">停止全部</button>
          <button class="btn btn-ghost btn-sm" onclick="App.backToSetup()">⚙ 设置</button>
        </div>
      </div>

      <!-- Queue Progress -->
      <div class="queue-bar hidden" id="queue-bar">
        <span id="queue-text">队列: 0/0</span>
        <div class="queue-progress-track">
          <div class="queue-progress-fill" id="queue-fill" style="width:0%"></div>
        </div>
        <span id="queue-percent">0%</span>
      </div>

      <!-- Main Layout -->
      <div class="main-layout">
        <!-- Instance Panel (left) -->
        <div class="instance-panel">
          <div class="panel-header">
            <h2>📦 实例列表</h2>
            <span id="instance-count" style="font-size:0.75rem;color:var(--text-muted)">0 个服务</span>
          </div>
          <div class="instance-list" id="instance-list">
            <!-- Rendered by JS -->
          </div>
        </div>

        <!-- Chat Panel (right) -->
        <div class="chat-panel" id="chat-panel">
          <div class="chat-empty" id="chat-empty">
            <div class="empty-icon">💬</div>
            <h3>选择一个实例</h3>
            <p>点击左侧实例卡片查看审计进度或进行交互式对话</p>
          </div>

          <!-- Chat content (hidden by default) -->
          <div id="chat-content" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
            <div class="chat-header" id="chat-header">
              <span class="chat-header-name" id="chat-instance-name">-</span>
              <span class="chat-header-status" id="chat-instance-status">-</span>
              <div class="chat-header-actions">
                <label class="auto-refresh-toggle" title="自动拉取最新消息">
                  <input type="checkbox" id="toggle-auto-refresh">
                  <span class="slider"></span>
                  <span class="label-text">自动刷新</span>
                </label>
                <button class="btn btn-ghost btn-sm" id="btn-refresh-messages" onclick="App.refreshMessages()">🔄 刷新</button>
                <button class="btn btn-danger btn-sm" id="btn-abort" onclick="App.abortCurrentSession()">⏹ 中止</button>
              </div>
            </div>
            <div class="chat-messages" id="chat-messages">
              <!-- Rendered by JS -->
            </div>
            <div class="chat-input-area">
              <div class="chat-input-wrapper">
                <textarea id="chat-input" rows="1" placeholder="输入消息与此实例交互..." onkeydown="App.onChatKeyDown(event)"></textarea>
                <button class="chat-send-btn" id="btn-send" onclick="App.sendMessage()">➤</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
